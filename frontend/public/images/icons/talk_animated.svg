<svg width="320" height="310" viewBox="0 0 320 310" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes bobLeft {
      0%,100%{transform:translateY(0px) rotate(0deg)}
      25%{transform:translateY(-7px) rotate(-2deg)}
      75%{transform:translateY(-3px) rotate(1deg)}
    }
    @keyframes bobRight {
      0%,100%{transform:translateY(0px) rotate(0deg)}
      25%{transform:translateY(-4px) rotate(1deg)}
      75%{transform:translateY(-8px) rotate(-1.5deg)}
    }
    @keyframes bubbleFloat {
      0%,100%{transform:translateY(0px) scale(1)}
      50%{transform:translateY(-6px) scale(1.02)}
    }
    @keyframes bubblePop {
      0%{transform:scale(0) translateY(20px);opacity:0}
      60%{transform:scale(1.08) translateY(-2px);opacity:1}
      100%{transform:scale(1) translateY(0);opacity:1}
    }
    @keyframes typingDot {
      0%,60%,100%{transform:translateY(0);opacity:0.3}
      30%{transform:translateY(-5px);opacity:1}
    }
    @keyframes switchBubble {
      0%,45%{opacity:1}
      50%,95%{opacity:0}
      100%{opacity:1}
    }
    @keyframes switchDots {
      0%,45%{opacity:0}
      50%,95%{opacity:1}
      100%{opacity:0}
    }
    @keyframes eyeBlink {
      0%,92%,100%{transform:scaleY(1)}
      96%{transform:scaleY(0.1)}
    }
    @keyframes eyeBlinkR {
      0%,88%,100%{transform:scaleY(1)}
      94%{transform:scaleY(0.1)}
    }
    @keyframes smileGrow {
      0%,100%{transform:scaleX(1)}
      50%{transform:scaleX(1.15)}
    }
    @keyframes ripple {
      0%{r:4;opacity:0.8} 100%{r:18;opacity:0}
    }

    .person-left { animation: bobLeft 2.6s ease-in-out infinite; transform-origin:100px 200px; }
    .person-right { animation: bobRight 3.0s ease-in-out infinite 0.6s; transform-origin:220px 200px; }

    .bubble-group {
      animation: bubblePop 0.55s cubic-bezier(0.34,1.56,0.64,1) both,
                 bubbleFloat 3s ease-in-out 0.55s infinite;
      transform-origin: 160px 148px;
    }
    .bubble-lines { animation: switchBubble 4s ease-in-out infinite; }
    .bubble-dots  { animation: switchDots  4s ease-in-out infinite; }

    .td1 { animation: typingDot 1s ease-in-out infinite 0.0s; }
    .td2 { animation: typingDot 1s ease-in-out infinite 0.18s; }
    .td3 { animation: typingDot 1s ease-in-out infinite 0.36s; }

    .eye-left  { animation: eyeBlink  3.5s ease-in-out infinite; transform-origin: 91px 158px; }
    .eye-right { animation: eyeBlink  3.5s ease-in-out infinite 0.05s; transform-origin: 109px 158px; }
    .eye-rl    { animation: eyeBlinkR 4.2s ease-in-out infinite 1s; transform-origin: 211px 154px; }
    .eye-rr    { animation: eyeBlinkR 4.2s ease-in-out infinite 1.05s; transform-origin: 229px 154px; }

    .smile-l { animation: smileGrow 2.6s ease-in-out infinite; transform-origin: 100px 172px; }
    .smile-r { animation: smileGrow 3.0s ease-in-out infinite 0.6s; transform-origin: 220px 168px; }

    .ripple1 { animation: ripple 2s ease-out infinite 0.2s; transform-origin: 100px 120px; fill:none; stroke:#5C6BC0; stroke-width:2; opacity:0; }
    .ripple2 { animation: ripple 2s ease-out infinite 0.8s; transform-origin: 100px 120px; fill:none; stroke:#5C6BC0; stroke-width:1.5; opacity:0; }
  </style>
</defs>

<!-- Table -->
<rect x="38" y="228" width="244" height="22" rx="6" fill="#D4614A" stroke="#1a237e" stroke-width="4"/>

<!-- ===== PERSON LEFT ===== -->
