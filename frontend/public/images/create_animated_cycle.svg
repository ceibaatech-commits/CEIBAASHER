<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes pulseFace { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    @keyframes blink { 0%,93%,100%{transform:scaleY(1)} 96%{transform:scaleY(0.1)} }
    .ring { animation: spin 6s linear infinite; transform-origin:150px 150px; }
    .face { animation: pulseFace 3s ease-in-out infinite; transform-origin:150px 155px; }
    .eL { animation: blink 4s ease-in-out infinite; transform-origin:137px 152px; }
    .eR { animation: blink 4s ease-in-out infinite 0.07s; transform-origin:163px 152px; }
  </style>
</defs>

<circle cx="150" cy="150" r="88" fill="white"/>

<g class="ring">
  <circle cx="150" cy="150" r="118" fill="none" stroke="#1a237e" stroke-width="7"/>
  <circle cx="150" cy="150" r="84"  fill="none" stroke="#1a237e" stroke-width="7"/>

  <!-- PINK arc -->
  <circle cx="150" cy="150" r="101" fill="none" stroke="#F472B6" stroke-width="32"
    stroke-dasharray="146 542" stroke-dashoffset="0" stroke-linecap="butt" transform="rotate(-90 150 150)"/>
  <!-- PURPLE arc -->
  <circle cx="150" cy="150" r="101" fill="none" stroke="#A78BFA" stroke-width="32"
    stroke-dasharray="146 542" stroke-dashoffset="-158" stroke-linecap="butt" transform="rotate(-90 150 150)"/>
  <!-- TEAL arc -->
  <circle cx="150" cy="150" r="101" fill="none" stroke="#4DD9C0" stroke-width="32"
    stroke-dasharray="146 542" stroke-dashoffset="-316" stroke-linecap="butt" transform="rotate(-90 150 150)"/>
  <!-- YELLOW arc -->
  <circle cx="150" cy="150" r="101" fill="none" stroke="#FFD54F" stroke-width="32"
    stroke-dasharray="146 542" stroke-dashoffset="-474" stroke-linecap="butt" transform="rotate(-90 150 150)"/>

  <!-- Arc border outlines outer -->
  <circle cx="150" cy="150" r="117" fill="none" stroke="#1a237e" stroke-width="3" stroke-dasharray="146 542" stroke-dashoffset="0"    stroke-linecap="round" transform="rotate(-90 150 150)"/>
  <circle cx="150" cy="150" r="117" fill="none" stroke="#1a237e" stroke-width="3" stroke-dasharray="146 542" stroke-dashoffset="-158" stroke-linecap="round" transform="rotate(-90 150 150)"/>
  <circle cx="150" cy="150" r="117" fill="none" stroke="#1a237e" stroke-width="3" stroke-dasharray="146 542" stroke-dashoffset="-316" stroke-linecap="round" transform="rotate(-90 150 150)"/>
  <circle cx="150" cy="150" r="117" fill="none" stroke="#1a237e" stroke-width="3" stroke-dasharray="146 542" stroke-dashoffset="-474" stroke-linecap="round" transform="rotate(-90 150 150)"/>
  <!-- Arc border outlines inner -->
  <circle cx="150" cy="150" r="85" fill="none" stroke="#1a237e" stroke-width="3" stroke-dasharray="146 542" stroke-dashoffset="0"    stroke-linecap="round" transform="rotate(-90 150 150)"/>
  <circle cx="150" cy="150" r="85" fill="none" stroke="#1a237e" stroke-width="3" stroke-dasharray="146 542" stroke-dashoffset="-158" stroke-linecap="round" transform="rotate(-90 150 150)"/>
  <circle cx="150" cy="150" r="85" fill="none" stroke="#1a237e" stroke-width="3" stroke-dasharray="146 542" stroke-dashoffset="-316" stroke-linecap="round" transform="rotate(-90 150 150)"/>
  <circle cx="150" cy="150" r="85" fill="none" stroke="#1a237e" stroke-width="3" stroke-dasharray="146 542" stroke-dashoffset="-474" stroke-linecap="round" transform="rotate(-90 150 150)"/>

  <!-- Junction dots -->
  <circle cx="150" cy="32"  r="9" fill="#1a237e"/>
  <circle cx="268" cy="150" r="9" fill="#1a237e"/>
  <circle cx="150" cy="268" r="9" fill="#1a237e"/>
  <circle cx="32"  cy="150" r="9" fill="#1a237e"/>

  <!-- Big chevron arrows -->
  <polygon points="0,-20 18,12 0,4 -18,12"
    fill="#F472B6" stroke="#1a237e" stroke-width="3" stroke-linejoin="round"
    transform="translate(268,150) rotate(180)"/>
  <polygon points="0,-20 18,12 0,4 -18,12"
    fill="#A78BFA" stroke="#1a237e" stroke-width="3" stroke-linejoin="round"
    transform="translate(150,268) rotate(270)"/>
  <polygon points="0,-20 18,12 0,4 -18,12"
    fill="#4DD9C0" stroke="#1a237e" stroke-width="3" stroke-linejoin="round"
    transform="translate(32,150) rotate(0)"/>
  <polygon points="0,-20 18,12 0,4 -18,12"
    fill="#FFD54F" stroke="#1a237e" stroke-width="3" stroke-linejoin="round"
    transform="translate(150,32) rotate(90)"/>
</g>

<!-- Inner white mask + border -->
<circle cx="150" cy="150" r="80" fill="white"/>
<circle cx="150" cy="150" r="80" fill="none" stroke="#1a237e" stroke-width="6"/>

<!-- FACE -->
<g class="face">
  <rect x="116" y="120" width="68" height="72" rx="20" fill="#FDDCB5" stroke="#1a237e" stroke-width="4.5"/>
  <path d="M118 138 Q119 120 150 120 Q181 120 182 138 Q172 126 150 127 Q128 126 118 138Z"
    fill="#8D5524" stroke="#1a237e" stroke-width="3.5" stroke-linejoin="round"/>
  <rect x="116" y="133" width="68" height="15" rx="6" fill="#2A4A5E" stroke="#1a237e" stroke-width="3"/>
  <g class="eL">
    <ellipse cx="137" cy="152" rx="6" ry="6.5" fill="white" stroke="#1a237e" stroke-width="2"/>
    <circle cx="138" cy="153" r="3.5" fill="#1a237e"/>
    <circle cx="139" cy="151" r="1.3" fill="white"/>
  </g>
  <g class="eR">
    <ellipse cx="163" cy="152" rx="6" ry="6.5" fill="white" stroke="#1a237e" stroke-width="2"/>
    <circle cx="164" cy="153" r="3.5" fill="#1a237e"/>
    <circle cx="165" cy="151" r="1.3" fill="white"/>
  </g>
  <ellipse cx="150" cy="165" rx="4" ry="3" fill="#e8a87c" opacity="0.5"/>
  <path d="M140 173 Q150 182 160 173" fill="#E91E8C" stroke="#1a237e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M140 173 Q150 169 160 173" fill="#FDDCB5" stroke="none"/>
  <ellipse cx="124" cy="163" rx="6" ry="4" fill="#f4a0a0" opacity="0.4"/>
  <ellipse cx="176" cy="163" rx="6" ry="4" fill="#f4a0a0" opacity="0.4"/>
</g>

</svg>
